<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Наши Приемы Пищи</title>
    <style>
        /* Базовые стили и переменные для тем */
        :root {
            --bg-color: #f4f4f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --text-muted: #666666;
            --border-color: #eeeeee;
            --primary: #007bff;
            --danger: #ef4444;
        }

        body.dark-theme {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #374151;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-color);
            padding: 20px; 
            max-width: 500px; 
            margin: 0 auto; 
            transition: background 0.3s, color 0.3s;
        }
        
        .card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 16px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            margin-bottom: 20px; 
            transition: background 0.3s;
        }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h2, h3 { margin: 0; color: var(--text-color); }
        
        .btn { 
            padding: 12px 15px; border: none; border-radius: 8px; 
            cursor: pointer; background: var(--primary); color: white; 
            font-weight: bold; font-size: 16px; width: 100%; box-sizing: border-box;
            margin-bottom: 10px;
        }
        .btn-icon { background: var(--border-color); color: var(--text-color); padding: 10px; border-radius: 50%; width: auto; margin: 0;}
        .btn-danger { background: var(--danger); }
        .btn-outline { background: transparent; border: 2px solid var(--border-color); color: var(--text-color); }
        
        .hidden { display: none !important; }
        
        /* Экран авторизации */
        #userList { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        .user-login-btn { 
            padding: 15px; background: var(--bg-color); border: 2px solid var(--border-color);
            border-radius: 12px; font-size: 18px; cursor: pointer; color: var(--text-color);
        }

        /* Инпуты */
        input { 
            width: 100%; padding: 12px; margin-bottom: 10px; 
            border-radius: 8px; border: 1px solid var(--border-color); 
            background: var(--bg-color); color: var(--text-color); box-sizing: border-box;
        }
        
        /* Камера */
        .photo-label { 
            display: block; background: #22c55e; color: white; 
            text-align: center; padding: 16px; border-radius: 12px; 
            cursor: pointer; font-weight: bold; font-size: 16px; margin-bottom: 10px;
        }
        input[type="file"] { display: none; }
        
        /* Модалки (Настройки и Ручной ввод) */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center;
            padding: 20px; box-sizing: border-box;
        }
        .modal-content {
            background: var(--card-bg); padding: 20px; border-radius: 16px; width: 100%; max-width: 400px;
        }
    </style>
</head>
<body>

<div id="authScreen" class="card">
    <h2>👋 Кто кушает?</h2>
    <p style="color: var(--text-muted)">Выберите свой профиль или создайте новый</p>
    <div id="userList"></div>
    <button class="btn btn-outline" onclick="addNewUser()">+ Добавить пользователя</button>
</div>

<div id="appScreen" class="hidden">
    
    <div class="card header">
        <div>
            <h2 id="greetingName">Привет!</h2>
            <button class="btn-icon" style="font-size: 12px; padding: 5px 10px; border-radius: 8px;" onclick="logout()">Выйти</button>
        </div>
        <button class="btn-icon" onclick="openSettings()">⚙️</button>
    </div>

    <div class="card">
        <h3>Добавить прием пищи</h3>
        <label class="photo-label">
            📸 Сфоткать блюдо (ИИ)
            <input type="file" accept="image/*" capture="environment" id="photoInput">
        </label>
        <button class="btn btn-outline" onclick="openManualEntry()">✍️ Ввести вручную</button>
    </div>

    <div class="card">
        <h3>📊 Мой дневник на сегодня</h3>
        <p style="color: var(--text-muted)">Здесь будет статистика только для текущего пользователя.</p>
        </div>
</div>

<div id="settingsModal" class="modal hidden">
    <div class="modal-content">
        <div class="header">
            <h3>Настройки</h3>
            <button class="btn-icon" onclick="closeModals()">❌</button>
        </div>
        
        <button class="btn btn-outline" onclick="toggleTheme()">🌓 Сменить тему (Светлая/Темная)</button>
        
        <div id="adminBlock" class="hidden" style="margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border-color);">
            <h4 style="margin-top:0; color: #f97316;">🔑 Админ-панель (Только Илья)</h4>
            <input type="password" id="geminiKey" placeholder="API Ключ Gemini...">
            <button class="btn" style="background: #f97316;" onclick="saveKey()">Сохранить ключ</button>
        </div>

        <div style="margin-top: 25px; padding-top: 15px; border-top: 1px solid var(--border-color);">
            <button class="btn btn-danger" onclick="deleteAccount()">🗑️ Удалить мой аккаунт</button>
        </div>
    </div>
</div>

<div id="manualModal" class="modal hidden">
    <div class="modal-content">
        <div class="header">
            <h3>Ручной ввод</h3>
            <button class="btn-icon" onclick="closeModals()">❌</button>
        </div>
        <input type="text" id="manName" placeholder="Название блюда">
        <input type="number" id="manKcal" placeholder="Калории (ккал)">
        <div style="display: flex; gap: 10px;">
            <input type="number" id="manP" placeholder="Белки (г)">
            <input type="number" id="manF" placeholder="Жиры (г)">
            <input type="number" id="manC" placeholder="Углеводы (г)">
        </div>
        <button class="btn" onclick="saveManual()">💾 Сохранить</button>
    </div>
</div>

<script>
    let users = JSON.parse(localStorage.getItem('app_users')) || [];
    let currentUser = null;

    // При загрузке страницы применяем сохраненную тему и рендерим экран входа
    window.onload = () => {
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-theme');
        }
        renderAuthScreen();
    };

    // --- ЛОГИКА АВТОРИЗАЦИИ ---
    function renderAuthScreen() {
        const list = document.getElementById('userList');
        list.innerHTML = '';
        users.forEach(name => {
            const btn = document.createElement('button');
            btn.className = 'user-login-btn';
            btn.textContent = name;
            btn.onclick = () => login(name);
            list.appendChild(btn);
        });
    }

    function addNewUser() {
        const name = prompt('Введите имя:');
        if (name && name.trim()) {
            if (!users.includes(name.trim())) {
                users.push(name.trim());
                localStorage.setItem('app_users', JSON.stringify(users));
                renderAuthScreen();
            } else {
                alert('Такой пользователь уже есть!');
            }
        }
    }

    function login(name) {
        currentUser = name;
        document.getElementById('authScreen').classList.add('hidden');
        document.getElementById('appScreen').classList.remove('hidden');
        document.getElementById('greetingName').textContent = `Тарелка: ${name}`;

        // МАГИЯ АДМИНА: Если зашел Илья, открываем доступ к API
        if (currentUser === 'Илья') {
            document.getElementById('adminBlock').classList.remove('hidden');
            document.getElementById('geminiKey').value = localStorage.getItem('gemini_api_key') || '';
        } else {
            document.getElementById('adminBlock').classList.add('hidden');
        }
    }

    function logout() {
        currentUser = null;
        document.getElementById('appScreen').classList.add('hidden');
        document.getElementById('authScreen').classList.remove('hidden');
    }

    // --- НАСТРОЙКИ ---
    function openSettings() {
        document.getElementById('settingsModal').classList.remove('hidden');
    }

    function closeModals() {
        document.getElementById('settingsModal').classList.add('hidden');
        document.getElementById('manualModal').classList.add('hidden');
    }

    function toggleTheme() {
        document.body.classList.toggle('dark-theme');
        const isDark = document.body.classList.contains('dark-theme');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    function saveKey() {
        const key = document.getElementById('geminiKey').value;
        localStorage.setItem('gemini_api_key', key.trim());
        alert('Ключ API сохранен!');
    }

    function deleteAccount() {
        if (confirm(`Удалить аккаунт "${currentUser}"?`)) {
            users = users.filter(u => u !== currentUser);
            localStorage.setItem('app_users', JSON.stringify(users));
            closeModals();
            logout();
            renderAuthScreen();
        }
    }

    // --- РУЧНОЙ ВВОД ---
    function openManualEntry() {
        document.getElementById('manualModal').classList.remove('hidden');
    }

    function saveManual() {
        const name = document.getElementById('manName').value;
        const kcal = document.getElementById('manKcal').value;
        if (!name || !kcal) {
            alert('Укажите хотя бы название и калории!');
            return;
        }
        alert(`Блюдо "${name}" на ${kcal} ккал сохранено для: ${currentUser}`);
        closeModals();
        // Очищаем поля
        document.querySelectorAll('#manualModal input').forEach(input => input.value = '');
    }
</script>

</body>
</html>
